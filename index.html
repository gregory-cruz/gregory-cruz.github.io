<style>
  :root {
    --bg: #080e1a;
    --surface: #0d1829;
    --surface2: #132035;
    --accent: #f5c400;
    --accent2: #3b82f6;
    --text: #e8eef8;
    --muted: #6b7fa3;
    --border: rgba(255,255,255,0.07);
    --font-display: 'Playfair Display', serif;
    --font-body: 'Lato', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); line-height: 1.6; overflow-x: hidden; }
  h1, h2, h3 { font-family: var(--font-display); }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 1.2rem 3rem;
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(8,14,26,0.88);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .nav-burger { display: none; }
  .nav-logo { font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); letter-spacing: 0.1em; }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a {
    font-size: 0.85rem; color: var(--muted); text-decoration: none;
    letter-spacing: 0.08em; text-transform: uppercase;
    position: relative; transition: color 0.2s;
  }
  .nav-links a::after {
    content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
    height: 1px; background: var(--accent);
    transform: scaleX(0); transform-origin: left; transition: transform 0.25s ease;
  }
  .nav-links a:hover { color: var(--text); }
  .nav-links a:hover::after { transform: scaleX(1); }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column; justify-content: center;
    padding: 0 10vw; position: relative; overflow: hidden;
  }
  .hero-grid { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .hero-grid canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

  .hero-badge {
    font-family: var(--font-mono); font-size: 0.75rem;
    color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase;
    margin-bottom: 1.5rem;
    display: inline-flex; align-items: center; gap: 0.6rem;
    animation: fadeUp 0.7s ease both; animation-delay: 0.1s;
  }
  .hero-badge::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); animation: pulse 2s infinite;
  }
  .hero h1 {
    font-size: clamp(3rem, 8vw, 7rem); font-weight: 800; line-height: 1.05;
    letter-spacing: -0.03em;
    animation: fadeUp 0.7s ease both; animation-delay: 0.25s;
  }
  .hero h1 span { color: var(--accent2); }
  .hero-sub {
    margin-top: 1.5rem; font-size: clamp(1rem, 1.5vw, 1.25rem);
    color: var(--muted); max-width: 540px; font-weight: 400;
    animation: fadeUp 0.7s ease both; animation-delay: 0.4s;
  }
  .hero-cta {
    margin-top: 3rem; display: flex; gap: 1rem; flex-wrap: wrap;
    animation: fadeUp 0.7s ease both; animation-delay: 0.55s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .btn {
    padding: 0.85rem 2rem; border-radius: 4px;
    font-family: var(--font-mono); font-size: 0.8rem;
    letter-spacing: 0.08em; text-transform: uppercase;
    text-decoration: none; cursor: pointer; border: none; transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #080e1a; font-weight: 700; }
  .btn-primary:hover { background: #ffd429; transform: translateY(-2px); }
  .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-outline:hover { border-color: rgba(255,255,255,0.25); transform: translateY(-2px); }

  /* SECTIONS */
  section { padding: 7rem 10vw; }
  .section-label {
    font-family: var(--font-mono); font-size: 0.7rem;
    color: var(--accent); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 1rem;
  }
  .section-title {
    font-size: clamp(1.8rem, 3vw, 2.8rem); font-weight: 700;
    letter-spacing: -0.02em; margin-bottom: 3.5rem;
  }

  /* À PROPOS */
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: start; }
  .about-text p { color: var(--muted); margin-bottom: 1.2rem; line-height: 1.8; }
  .about-info { display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem; }
  .info-row { display: flex; gap: 1rem; font-family: var(--font-mono); font-size: 0.8rem; }
  .info-label { color: var(--accent); min-width: 100px; }
  .info-val { color: var(--text); }

  /* COMPÉTENCES — barres sans pourcentage */
  .skills-list { display: flex; flex-direction: column; gap: 1.4rem; }
  .skill-item { display: flex; flex-direction: column; gap: 0.5rem; }
  .skill-name { font-size: 0.85rem; font-weight: 600; color: var(--text); }
  .skill-bar { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .skill-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  /* PHOTO HERO */
  .hero-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 2rem;
    width: 100%;
  }
  .hero-text { flex: 1; }
  .hero-photo {
    flex-shrink: 0;
    position: relative;
    z-index: 2;
  }
  .hero-photo img {
    width: 260px; height: 260px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center 10%;
    border: 2px solid rgba(245,196,0,0.35);
    display: block;
  }
  .hero-photo::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid rgba(59,130,246,0.2);
    pointer-events: none;
  }
  .hero-photo::after {
    content: '';
    position: absolute;
    inset: -16px;
    border-radius: 50%;
    border: 1px solid rgba(245,196,0,0.08);
    pointer-events: none;
  }
  @media (max-width: 768px) {
    .hero-inner { flex-direction: column-reverse; align-items: flex-start; gap: 1.5rem; }
    .hero-photo img { width: 120px; height: 120px; }
  }
  .about-photo {
    display: flex;
    justify-content: center;
    margin-bottom: 2rem;
  }
  .about-photo-wrap {
    position: relative;
    width: 160px; height: 160px;
    flex-shrink: 0;
  }
  .about-photo-wrap img {
    width: 160px; height: 160px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    border: 2px solid rgba(245,196,0,0.3);
    display: block;
  }
  .about-photo-wrap::after {
    content: '';
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 1px solid rgba(59,130,246,0.2);
    pointer-events: none;
  }
  .skills-cloud { display: flex; flex-direction: column; gap: 1.8rem; }
  .skills-category-label {
    font-family: var(--font-mono); font-size: 0.68rem;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 0.6rem;
  }
  .skills-tags { display: flex; flex-wrap: wrap; gap: 0.6rem; }
  .skill-tag {
    font-family: var(--font-mono); font-size: 0.78rem;
    padding: 0.45rem 1rem; border-radius: 30px;
    border: 1px solid var(--border);
    color: var(--text); background: var(--surface);
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    cursor: default;
  }
  .skill-tag:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(245,196,0,0.06);
  }
  .skill-tag.blue:hover {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(59,130,246,0.06);
  }

  /* FILTRES PROJETS */
  .filter-tabs { display: flex; gap: 0.75rem; margin-bottom: 2.5rem; flex-wrap: wrap; }
  .filter-btn {
    font-family: var(--font-mono); font-size: 0.75rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.6rem 1.4rem; border-radius: 30px;
    border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.2s;
  }
  .filter-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

  /* LIEN FICHE TECHNIQUE */
  .project-card h3 { font-size: 1.15rem; font-weight: 700; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.6rem; }
  .doc-link {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 3px;
    background: rgba(59,130,246,0.12);
    border: 1px solid rgba(59,130,246,0.3);
    color: var(--accent2); text-decoration: none;
    font-family: var(--font-mono); font-size: 0.55rem;
    letter-spacing: 0.05em; font-weight: 500;
    flex-shrink: 0;
    transition: background 0.2s, border-color 0.2s;
  }
  .doc-link:hover { background: rgba(59,130,246,0.22); border-color: rgba(59,130,246,0.6); }
  .filter-btn.active { background: var(--accent); color: #080e1a; border-color: var(--accent); font-weight: 700; }

  /* PROJETS */
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; align-items: start; }
  .project-card {
    background: var(--surface); border: 1px solid var(--border);
    border-top: 3px solid var(--accent2);
    border-radius: 8px; padding: 2rem;
    transition: border-color 0.2s, transform 0.2s;
    display: flex; flex-direction: column;
  }
  .project-card[data-category="alternance"] { border-top: 3px solid var(--accent); }
  .project-card:hover { border-color: rgba(59,130,246,0.4); transform: translateY(-4px); }
  .project-card[data-category="alternance"]:hover { border-color: rgba(245,196,0,0.4); }
  .project-card.hidden { display: none; }
  .project-tag {
    font-family: var(--font-mono); font-size: 0.65rem;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--accent2); margin-bottom: 0.6rem;
  }
  .project-card[data-category="alternance"] .project-tag { color: var(--accent); }
  .project-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.75rem; display: flex; align-items: flex-start; gap: 0.6rem; }
  .project-card p { color: var(--muted); font-size: 0.9rem; line-height: 1.7; flex: 1; }
  .project-techs { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1.5rem; }
  .tech-badge {
    font-family: var(--font-mono); font-size: 0.7rem;
    background: var(--surface2); color: var(--muted);
    padding: 0.3rem 0.7rem; border-radius: 3px; border: 1px solid var(--border);
  }

    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 3px;
    background: rgba(59,130,246,0.12);
    border: 1px solid rgba(59,130,246,0.3);
    color: var(--accent2); text-decoration: none;
    font-family: var(--font-mono); font-size: 0.55rem;
    letter-spacing: 0.05em; font-weight: 500;
    flex-shrink: 0;
    transition: background 0.2s, border-color 0.2s;
  }
  .doc-link:hover { background: rgba(59,130,246,0.22); border-color: rgba(59,130,246,0.6); }
  .filter-btn.active { background: var(--accent); color: #080e1a; border-color: var(--accent); font-weight: 700; }

  /* PROJETS */
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; align-items: start; }
  .project-card {
    background: var(--surface); border: 1px solid var(--border);
    border-top: 3px solid var(--accent2);
    border-radius: 8px; padding: 2rem;
    transition: border-color 0.2s, transform 0.2s;
    display: flex; flex-direction: column;
  }
  .project-card[data-category="alternance"] { border-top: 3px solid var(--accent); }
  .project-card:hover { border-color: rgba(59,130,246,0.4); transform: translateY(-4px); }
  .project-card[data-category="alternance"]:hover { border-color: rgba(245,196,0,0.4); }
  .project-card.hidden { display: none; }
  .project-tag {
    font-family: var(--font-mono); font-size: 0.65rem;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--accent2); margin-bottom: 0.6rem;
  }
  .project-card[data-category="alternance"] .project-tag { color: var(--accent); }
  .project-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.75rem; display: flex; align-items: flex-start; gap: 0.6rem; }
  .project-card p { color: var(--muted); font-size: 0.9rem; line-height: 1.7; flex: 1; }
  .project-techs { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1.5rem; }
  .tech-badge {
    font-family: var(--font-mono); font-size: 0.7rem;
    background: var(--surface2); color: var(--muted);
    padding: 0.3rem 0.7rem; border-radius: 3px; border: 1px solid var(--border);
  }
